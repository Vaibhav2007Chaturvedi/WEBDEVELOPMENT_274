<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Manipulation Experiment</title>

    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
            transition: 0.3s;
        }
        button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        input {
            padding: 10px;
            width: 250px;
        }
    </style>
</head>

<body>

    <h1 id="heading">Welcome to JavaScript DOM</h1>

    <input type="text" id="inputText" placeholder="Enter your message">

    <br><br>

    <button id="changeTextBtn">Change Heading</button>
    <button id="colorBtn">Change Background</button>
    <button id="fontBtn">Increase Font</button>
    <button id="toggleBtn">Show/Hide Paragraph</button>
    <button id="resetBtn">Reset</button>

    <p id="para">This is a sample paragraph.</p>

<script>
// Selecting elements
const heading = document.getElementById("heading");
const input = document.getElementById("inputText");
const para = document.getElementById("para");

// Buttons
const changeTextBtn = document.getElementById("changeTextBtn");
const colorBtn = document.getElementById("colorBtn");
const fontBtn = document.getElementById("fontBtn");
const toggleBtn = document.getElementById("toggleBtn");
const resetBtn = document.getElementById("resetBtn");

let isVisible = true;
let fontSize = 24;

// Change Heading
changeTextBtn.addEventListener("click", () => {
    heading.innerText = input.value || "Please enter text!";
});

// Change Background (random color)
colorBtn.addEventListener("click", () => {
    const colors = ["lightblue", "lightgreen", "lightpink", "lightyellow"];
    document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
});

// Increase Font Size
fontBtn.addEventListener("click", () => {
    fontSize += 4;
    heading.style.fontSize = fontSize + "px";
});

// Toggle Paragraph
toggleBtn.addEventListener("click", () => {
    isVisible = !isVisible;
    para.style.display = isVisible ? "block" : "none";
});

// Live Input Preview
input.addEventListener("input", () => {
    heading.innerText = input.value;
});

// Reset
resetBtn.addEventListener("click", () => {
    heading.innerText = "Welcome to JavaScript DOM";
    document.body.style.backgroundColor = "white";
    heading.style.fontSize = "24px";
    para.style.display = "block";
    input.value = "";
    fontSize = 24;
});

</script>

</body>
</html>
